services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins/Dockerfile
    container_name: jenkins
    user: root
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - D:/my_jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
